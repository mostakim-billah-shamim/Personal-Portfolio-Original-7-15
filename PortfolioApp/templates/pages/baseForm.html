{% extends 'base/base.html' %}

{% block title %}{{title}}{% endblock title %}

{% block body %}
<div class="row justify-content-center mt-5">
    <div class="col-4 shadow-lg round-3 card p-5">
        <h1 class="text-center text-info">{{title}}</h1>
        <form action="" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{form.as_p}}
            <button class="btn btn-success rounded-2" type="submit">{{btn}}</button>
            <a href="{% url 'home' %}" class="btn btn-outline-primary btn-sm rounded-pill px-3">Home</a>
        </form>
    </div>
</div>
{% endblock body %}
