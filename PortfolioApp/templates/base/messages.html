{% if messages %}
    <!-- 🟢 এই ফাইলের জন্যই শুধু সিএসএস ট্যাগ -->
    <style>
        .custom-floating-alert-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99999;
            width: 90%;
            max-width: 600px;
            margin: 0 !important;
            padding: 0 !important;
        }

        .custom-floating-alert-container .alert {
            margin: 0 !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
    </style>

    <!-- 🟢 মেসেজ কন্টেইনার এবং লুপ -->
    <div class="custom-floating-alert-container">
        {% for message in messages %}
            <div class="alert alert-{{message.tags}} alert-dismissible fade show text-center" role="alert">
                {{ message }}
            </div>
        {% endfor %}
    </div>

    <!-- 🟢 ৫ সেকেন্ড পর মেসেজটি অটো গায়েব করার স্ক্রিপ্ট (ঐচ্ছিক) -->
    <script>
        setTimeout(function() {
            let alertBox = document.querySelector('.custom-floating-alert-container');
            if (alertBox) {
                alertBox.style.transition = "opacity 0.5s ease";
                alertBox.style.opacity = "0";
                setTimeout(() => alertBox.remove(), 500);
            }
        }, 5000);
    </script>
{% endif %}
